# Configuration for Cog ⚙️
# Reference: https://github.com/replicate/cog/blob/main/docs/yaml.md

build:
  # set to true if your model requires a GPU
  gpu: true
  cuda: "12.4"

  # a list of ubuntu apt packages to install
  system_packages:
    - "ffmpeg"
    - "libsndfile1"

  # python version in the form '3.8' or '3.8.12'
  python_version: "3.9"

  # a list of packages in the format <package-name>==<version>
  python_packages:
    - "torch==2.6.0"
    - "torchaudio==2.6.0"
    - "torchvision==0.21.0"
    - "tqdm==4.67.3"
    - "gradio==3.44.4"
    - "pyyaml==6.0.2"
    - "einops==0.8.2"
    - "chardet==5.2.0"
    - "numpy==1.23.5"
    - "soundfile==0.13.1"
    - "librosa==0.9.2"
    - "scipy==1.13.1"
    - "pandas==2.2.3"
    - "unidecode==1.4.0"
    - "phonemizer==3.3.0"
    - "torchlibrosa==0.1.0"
    - "transformers==4.49.0"
    - "huggingface_hub==0.27.0"
    - "progressbar==2.5"
    - "ftfy==6.3.1"
    - "timm==0.9.7"
    - "audiosr==0.0.7"

# predict.py defines how predictions are run on your model
predict: "predict.py:Predictor"
